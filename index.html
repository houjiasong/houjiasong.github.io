<!DOCTYPE html>
<html>
<head>
	<title>小组课表</title>
	<style type="text/css">
		table {
			border-collapse: collapse;
			margin: 20px;
			width: 100%;
		}
		th {
			background-color: #ddd;
			border: 1px solid black;
			padding: 10px;
			text-align: center;
			font-weight: bold;
		}
		td {
			border: 1px solid black;
			padding: 10px;
			text-align: center;
		}
		tr:nth-child(even) {
			background-color: #f2f2f2;
		}
	</style>
</head>
<body>
	<table>
		<thead>
			<tr class="header-row">
				<th>小组</th>
				<th>PACC</th>
				<th>ASR</th>
				<th>ACC</th>
			</tr>
		</thead>
		<tbody>
			<!-- 生成十个小组的行 -->
			<script type="text/javascript">
				for (let i = 1; i <= 10; i++) {
					document.write(`<tr${i == 1 ? ' class="header-row"' : ''}><td>小组 ${i}</td>`);
					// 生成每周的单元格
					for (let j = 1; j <= 3; j++) {
						document.write(`<td id="week-${j}-group-${i}">&nbsp;</td>`);
					}
					document.write('</tr>');
				}
			</script>
		</tbody>
	</table>

	<script type="text/javascript">
		// 在每个单元格中添加占位符
		//1
		document.getElementById(`week-${1}-group-${1}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${1}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${1}`).innerHTML = '0';
		//2
		document.getElementById(`week-${1}-group-${2}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${2}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${2}`).innerHTML = '0';
		//3
		document.getElementById(`week-${1}-group-${3}`).innerHTML = '27';
		document.getElementById(`week-${2}-group-${3}`).innerHTML = '23.8';
		document.getElementById(`week-${3}-group-${3}`).innerHTML = '98.6';
		//4
		document.getElementById(`week-${1}-group-${4}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${4}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${4}`).innerHTML = '0';
		//5
		document.getElementById(`week-${1}-group-${5}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${5}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${5}`).innerHTML = '0';
		//6
		document.getElementById(`week-${1}-group-${6}`).innerHTML = '46.6';
		document.getElementById(`week-${2}-group-${6}`).innerHTML = '9';
		document.getElementById(`week-${3}-group-${6}`).innerHTML = '67.4';
		//7
		document.getElementById(`week-${1}-group-${7}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${7}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${7}`).innerHTML = '0';
		//8
		document.getElementById(`week-${1}-group-${8}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${8}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${8}`).innerHTML = '0';
		//9
		document.getElementById(`week-${1}-group-${9}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${9}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${9}`).innerHTML = '0';
		//10
		document.getElementById(`week-${1}-group-${10}`).innerHTML = '0';
		document.getElementById(`week-${2}-group-${10}`).innerHTML = '0';
		document.getElementById(`week-${3}-group-${10}`).innerHTML = '0';
	</script>
</body>
</html>
