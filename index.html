<!DOCTYPE html>
<html>
<head>
	<title>小组课表</title>
	<style type="text/css">
		table {
			border-collapse: collapse;
			margin: 20px;
			width: 100%;
		}
		th {
			background-color: #ddd;
			border: 1px solid black;
			padding: 10px;
			text-align: center;
			font-weight: bold;
		}
		td {
			border: 1px solid black;
			padding: 10px;
			text-align: center;
		}
		tr:nth-child(even) {
			background-color: #f2f2f2;
		}
	</style>
</head>
<body>
	<table>
		<thead>
			<tr class="header-row">
				<th>小组</th>
				<th>第一周</th>
				<th>第二周</th>
				<th>第三周</th>
				<th>第四周</th>
				<th>第五周</th>
				<th>第六周</th>
			</tr>
		</thead>
		<tbody>
			<!-- 生成十个小组的行 -->
			<script type="text/javascript">
				for (let i = 1; i <= 10; i++) {
					document.write(`<tr${i == 1 ? ' class="header-row"' : ''}><td>小组 ${i}</td>`);
					// 生成每周的单元格
					for (let j = 1; j <= 6; j++) {
						document.write(`<td id="week-${j}-group-${i}">&nbsp;</td>`);
					}
					document.write('</tr>');
				}
			</script>
		</tbody>
	</table>

	<script type="text/javascript">
		// 在每个单元格中添加占位符
		for (let i = 1; i <= 10; i++) {
			for (let j = 1; j <= 6; j++) {
				document.getElementById(`week-${j}-group-${i}`).innerHTML = '&nbsp;';
			}
		}
	</script>
</body>
</html>
